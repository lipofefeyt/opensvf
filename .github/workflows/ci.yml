name: CI
on:
  push:
    branches: ["main", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Prepare Binaries and Mocks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p bin
          # Try real download
          bash scripts/download_fmu.sh || echo "Download failed, generating valid mocks"
          
          # Generate a VALID minimal FMU ZIP for tests to swallow
          python3 -c "
          import zipfile, os
          xml = '<fmiModelDescription fmiVersion=\"2.0\" modelName=\"Mock\"><CoSimulation modelIdentifier=\"Mock\"/></fmiModelDescription>'
          for name in ['SpacecraftDynamics.fmu', 'EpsFmu.fmu', 'BatteryFmu.fmu', 'SolarArrayFmu.fmu', 'PcduFmu.fmu']:
              path = os.path.join('bin', name)
              if not os.path.exists(path):
                  with zipfile.ZipFile(path, 'w') as f:
                      f.writestr('modelDescription.xml', xml)
          "
          ls -l bin/

      - name: Run pytest
        run: pytest tests/ --junitxml=results/junit.xml -v
