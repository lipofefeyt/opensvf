  aocs.attitude.quaternion_w:
    description: Attitude quaternion scalar component
    unit: ""
    dtype: float
    classification: TM
    domain: AOCS
    model_id: aocs
    valid_range: [-1.0, 1.0]
    pus:
      apid: 0x101
      service: 3
      subservice: 25
      parameter_id: 0x2001

