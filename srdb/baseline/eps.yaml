    unit: W
    dtype: float
    classification: TM
    domain: EPS
    model_id: pcdu
    valid_range: [0.0, 200.0]
    pus:
      apid: 0x100
      service: 3
      subservice: 25
      parameter_id: 0x1030

  eps.pcdu.charge_current:
