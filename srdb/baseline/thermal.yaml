# SVF SRDB — Thermal Domain Baseline
# Thermal Control subsystem parameters

parameters:

  # ── Temperature sensors ────────────────────────────────────────────────────

  thermal.obc.temperature:
    description: OBC board temperature
    unit: degC
    dtype: float
    classification: TM
    domain: THERMAL
    model_id: thermal
    valid_range: [-40.0, 85.0]
    pus:
      apid: 0x104
      service: 3
      subservice: 25
      parameter_id: 0x5001

  thermal.battery.temperature:
    description: Battery pack temperature
    unit: degC
    dtype: float
    classification: TM
    domain: THERMAL
    model_id: thermal
    valid_range: [-20.0, 60.0]
    pus:
      apid: 0x104
      service: 3
      subservice: 25
      parameter_id: 0x5002

  thermal.solar_panel.temperature:
    description: Solar panel temperature
    unit: degC
    dtype: float
    classification: TM
    domain: THERMAL
    model_id: thermal
    valid_range: [-100.0, 150.0]
    pus:
      apid: 0x104
      service: 3
      subservice: 25
      parameter_id: 0x5003

  thermal.structure.temperature:
    description: Spacecraft structure temperature
    unit: degC
    dtype: float
    classification: TM
    domain: THERMAL
    model_id: thermal
    valid_range: [-40.0, 80.0]
    pus:
